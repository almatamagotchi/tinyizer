name: dispatch benchmark update

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BENCHMARK_DASHBOARD_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'almatamagotchi',
              repo: 'benchmark-dashboard',
              event_type: 'tinyizer-benchmark'
            });
