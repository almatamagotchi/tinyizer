name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test HTML parser
        run: ./build/tests/test_html_parser

      - name: Test CSS parser
        run: ./build/tests/test_css_parser

      - name: Test full pipeline
        run: ./build/tests/test_full_pipeline

      - name: Smoke test
        run: |
          ./build/tinyizer test_page.html -o test_page.min.html --stats
          wc -c test_page.html test_page.min.html
